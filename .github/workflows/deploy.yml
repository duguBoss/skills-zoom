name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build-only

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Output deploy info
        run: |
          REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          echo ""
          echo "========================================"
          echo "  Build completed successfully!"
          echo "  Deploy URL: ${URL}"
          echo "========================================"
          echo ""
          echo "::notice title=Deploy URL::${URL}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output access URL
        run: |
          REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          echo ""
          echo "========================================"
          echo "  Deploy completed successfully!"
          echo "  Access URL: ${URL}"
          echo "========================================"
          echo ""
          echo "::notice title=Access URL::${URL}"
          echo "# 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "项目已成功部署到 GitHub Pages。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**访问地址：** ${URL}" >> $GITHUB_STEP_SUMMARY
